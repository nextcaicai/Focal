packages:
  - apps/desktop
  - apps/ota-worker
  - apps/desktop/layer/*
  - packages/configs
  - packages/readability
  - packages/internal/*
  - "!**/example"
  - "!**/example/**"

catalog:
  "@follow-app/client-sdk": 0.3.95
  tailwindcss-uikit-colors: 1.0.0
  typescript: 5.9.3

ignorePatchFailures: false

onlyBuiltDependencies:
  - "@firebase/util"
  - "@tsslint/core"
  - "@tsslint/eslint"
  - bufferutil
  - core-js
  - dtrace-provider
  - electron
  - electron-winstaller
  - esbuild
  - fast-folder-size
  - fs-xattr
  - macos-alias
  - protobufjs
  - sharp
  - simple-git-hooks
  - utf-8-validate

overrides:
  "@electron/node-gyp": 10.2.0-electron.2
  "@floating-ui/core": 1.7.2
  "@floating-ui/dom": 1.7.2
  "@floating-ui/react": 0.27.14
  "@floating-ui/react-dom": 2.1.4
  "@follow-app/client-sdk": 0.3.95
  "@types/react": 19.2.14
  array-includes: npm:@nolyfill/array-includes@latest
  array.prototype.findlastindex: npm:@nolyfill/array.prototype.findlastindex@latest
  array.prototype.flat: npm:@nolyfill/array.prototype.flat@latest
  array.prototype.flatmap: npm:@nolyfill/array.prototype.flatmap@latest
  array.prototype.tosorted: npm:@nolyfill/array.prototype.tosorted@latest
  drizzle-orm: 0.45.1
  global-agent>serialize-error: 7.0.1
  has: npm:@nolyfill/has@latest
  is-core-module: npm:@nolyfill/is-core-module@1.0.39
  isarray: npm:@nolyfill/isarray@1.0.44
  lan-network@<0.1.7: 0.1.7
  object.assign: npm:@nolyfill/object.assign@latest
  object.entries: npm:@nolyfill/object.entries@latest
  object.fromentries: npm:@nolyfill/object.fromentries@latest
  object.groupby: npm:@nolyfill/object.groupby@latest
  object.hasown: npm:@nolyfill/object.hasown@latest
  object.values: npm:@nolyfill/object.values@latest
  react: 19.2.0
  react-dom: 19.2.0
  serialize-error: 2.1.0
  string.prototype.matchall: npm:@nolyfill/string.prototype.matchall@latest

patchedDependencies:
  "@microflash/remark-callout-directives": patches/@microflash__remark-callout-directives.patch
  "@mozilla/readability@0.6.0": patches/@mozilla__readability@0.6.0.patch
  "@pengx17/electron-forge-maker-appimage": patches/@pengx17__electron-forge-maker-appimage.patch
  re-resizable@6.11.2: patches/re-resizable@6.11.2.patch
  workbox-precaching: patches/workbox-precaching.patch
